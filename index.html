<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер Глав / Manga Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .top-controls { display: flex; align-items: center; gap: 15px; }
        
        .btn { background-color: #bb86fc; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #9965f4; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }
        
        .lang-select { background: #2c2c2c; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; cursor: pointer; outline: none; font-size: 0.95rem; }
        
        /* Навігація */
        .nav-tabs { display: flex; gap: 10px; border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; flex-wrap: wrap;}
        .nav-tab { background: transparent; color: #888; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; padding: 5px 10px; transition: 0.2s; position: relative; }
        .nav-tab:hover { color: #bb86fc; }
        .nav-tab.active { color: #bb86fc; border-bottom: 2px solid #bb86fc; }
        .badge-notification { background: #cf6679; color: #000; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; position: absolute; top: -5px; right: -10px; display: none; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Картки тайтлів */
        .tracker-card { background-color: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s opacity; }
        .platform { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .platform a { color: #bb86fc; text-decoration: none; font-weight: 500; border-bottom: 1px dashed transparent; transition: 0.2s; }
        .platform a:hover { border-bottom: 1px dashed #bb86fc; }
        
        .user-progress { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555; display: flex; align-items: center; justify-content: space-between; }
        .user-progress input { width: 60px; padding: 5px; background: #2c2c2c; color: white; border: 1px solid #555; border-radius: 4px; }
        
        /* Панель додавання та фільтри */
        .add-manga-panel { background: #2c2c2c; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .add-manga-panel input { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #555; background: #1e1e1e; color: white; }
        
        .filters-panel { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; border: 1px solid #333; flex-wrap: wrap; }
        .filters-panel input[type="text"] { flex: 1; min-width: 200px; padding: 10px; border-radius: 6px; border: 1px solid #555; background: #2c2c2c; color: white; }
        .filters-panel label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #e0e0e0; font-size: 0.95rem; user-select: none; }
        .filters-panel input[type="checkbox"] { width: 18px; height: 18px; accent-color: #bb86fc; cursor: pointer; }

        .delete-btn { background-color: transparent; color: #cf6679; border: 1px solid #cf6679; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .delete-btn:hover { background-color: #cf6679; color: #000; }
        .delete-btn svg { width: 16px; height: 16px; }

        /* Профіль та Сповіщення */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-box { background: #2c2c2c; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .stat-number { font-size: 2rem; color: #03dac6; font-weight: bold; margin: 10px 0; }
        .notification-card { background: #2a1b38; padding: 15px 20px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #bb86fc; display: flex; justify-content: space-between; align-items: center;}

        /* Каталог MangaDex */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .catalog-card { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .catalog-cover { width: 100%; height: 280px; object-fit: cover; background: #2c2c2c; }
        .catalog-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .catalog-title { font-weight: bold; margin: 0 0 10px 0; font-size: 1.1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .catalog-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px;}
        
        #main-content { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 data-i18n="title" style="margin: 0;">📚 Манхва Трекер</h2>
            <div class="top-controls">
                <select id="lang-switcher" class="lang-select">
                    <option value="uk">Українська</option>
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                </select>
                <div id="auth-controls">
                    <button class="btn" id="login-btn" data-i18n="loginBtn">Увійти через Google</button>
                    <button class="btn" id="logout-btn" style="display:none;" data-i18n="logoutBtn">Вийти</button>
                </div>
            </div>
        </div>

        <div id="login-message" data-i18n="loginMessage">Будь ласка, авторизуйтесь, щоб бачити свій прогрес та додавати тайтли.</div>

        <div id="main-content">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="library" data-i18n="tabLibrary">Бібліотека</button>
                <button class="nav-tab" data-tab="catalog" data-i18n="tabCatalog">Каталог</button>
                <button class="nav-tab" data-tab="notifications">
                    <span data-i18n="tabNotifications">Сповіщення</span>
                    <span class="badge-notification" id="notif-badge">0</span>
                </button>
                <button class="nav-tab" data-tab="profile" data-i18n="tabProfile">Профіль</button>
            </div>

            <!-- Бібліотека -->
            <div id="library" class="tab-content active">
                <div class="add-manga-panel">
                    <h3 data-i18n="addTitlePanel">➕ Додати власний тайтл</h3>
                    <input type="text" id="custom-name" data-i18n-placeholder="namePlaceholder" placeholder="Назва манхви (обов'язково)">
                    <input type="url" id="custom-senkuro" data-i18n-placeholder="senkuroPlaceholder" placeholder="Посилання на Senkuro (якщо є)">
                    <input type="url" id="custom-rutoki" data-i18n-placeholder="rutokiPlaceholder" placeholder="Посилання на Rutoki (якщо є)">
                    <button class="btn" id="save-custom-btn" style="width: 100%;" data-i18n="addBtn">Додати в кабінет</button>
                </div>

                <div class="filters-panel">
                    <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 Пошук за назвою...">
                    <label>
                        <input type="checkbox" id="unread-filter"> 
                        <span data-i18n="unreadFilter">Тільки з непрочитаними главами</span>
                    </label>
                </div>

                <div id="mangas-container"></div>
            </div>

            <!-- Каталог -->
            <div id="catalog" class="tab-content">
                <div class="filters-panel">
                    <input type="text" id="catalog-search" data-i18n-placeholder="catalogSearch" placeholder="🔍 Шукати мангу в глобальній базі MangaDex...">
                    <button class="btn" id="btn-search-catalog" data-i18n="searchBtn">Шукати</button>
                </div>
                <div id="catalog-container" class="catalog-grid"></div>
            </div>

            <!-- Сповіщення -->
            <div id="notifications" class="tab-content">
                <h3 data-i18n="newChaptersTitle">🔔 Нові релізи</h3>
                <div id="notifications-container"></div>
            </div>

            <!-- Профіль -->
            <div id="profile" class="tab-content">
                <div class="tracker-card">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;" data-i18n="yourProfile">Ваш профіль</h3>
                    <p style="color: #bbb;"><span data-i18n="userEmail">Email:</span> <strong id="profile-email" style="color:#fff;">...</strong></p>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div data-i18n="statTotalMangas">Відстежується тайтлів</div>
                            <div class="stat-number" id="stat-mangas">0</div>
                        </div>
                        <div class="stat-box">
                            <div data-i18n="statTotalRead">Прочитано глав загалом</div>
                            <div class="stat-number" id="stat-chapters">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! ВСТАВ СВІЙ FIREBASE CONFIG ТУТ !!!
        const firebaseConfig = {
            apiKey: "AIzaSyDTNL0XJRclOR9TF5QCicTTgCDUf4A27M8",
            authDomain: "manga-tracker-a0cf9.firebaseapp.com",
            projectId: "manga-tracker-a0cf9",
            storageBucket: "manga-tracker-a0cf9.firebasestorage.app",
            messagingSenderId: "148924633365",
            appId: "1:148924633365:web:283272abe6720b6886591c",
            measurementId: "G-B4CD86SKTX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const translations = {
            uk: {
                title: "📚 Манхва Трекер", loginBtn: "Увійти через Google", logoutBtn: "Вийти",
                loginMessage: "Будь ласка, авторизуйтесь, щоб бачити свій прогрес та додавати тайтли.",
                tabLibrary: "Бібліотека", tabCatalog: "Каталог", tabNotifications: "Сповіщення", tabProfile: "Профіль",
                addTitlePanel: "➕ Додати власний тайтл", namePlaceholder: "Назва манхви (обов'язково)",
                senkuroPlaceholder: "Посилання на Senkuro (якщо є)", rutokiPlaceholder: "Посилання на Rutoki (якщо є)",
                addBtn: "Додати в кабінет", searchPlaceholder: "🔍 Пошук за назвою...", catalogSearch: "🔍 Шукати мангу в глобальній базі MangaDex...",
                searchBtn: "Шукати", unreadFilter: "Тільки з непрочитаними главами", loading: "Завантаження даних...",
                emptyList: "Ваш список порожній. Додайте свій перший тайтл вище або знайдіть у Каталозі!",
                nothingFound: "Нічого не знайдено.", errorLoad: "Помилка завантаження.",
                waitScan: "Очікування...", read: "Прочитано:", saveBtn: "Зберегти", deleteBtn: "Видалити",
                alertName: "Назва обов'язкова!", alertLink: "Вкажіть хоча б одне посилання!",
                adding: "Додаємо...", saving: "...", saved: "✓", confirmDelete: 'Видалити "{name}" зі списку?',
                deleting: "Видалення...", errorDelete: "Не вдалося видалити тайтл.",
                newChaptersTitle: "🔔 Нові релізи", noNotifications: "Усі відстежувані глави прочитано!",
                newChaptersText: "Доступні нові глави: {from} - {to}",
                yourProfile: "Ваш профіль", userEmail: "Обліковий запис:", 
                statTotalMangas: "Відстежується тайтлів", statTotalRead: "Прочитано глав загалом", jumpToLibrary: "До бібліотеки",
                readOnDex: "Читати на MangaDex", trackThis: "Відстежувати"
            },
            en: {
                title: "📚 Manga Tracker", loginBtn: "Sign in with Google", logoutBtn: "Sign out",
                loginMessage: "Please log in to see your progress and add titles.",
                tabLibrary: "Library", tabCatalog: "Catalog", tabNotifications: "Notifications", tabProfile: "Profile",
                addTitlePanel: "➕ Add Custom Title", namePlaceholder: "Manga Title (required)",
                senkuroPlaceholder: "Senkuro Link (optional)", rutokiPlaceholder: "Rutoki Link (optional)",
                addBtn: "Add to Library", searchPlaceholder: "🔍 Search by title...", catalogSearch: "🔍 Search MangaDex global database...",
                searchBtn: "Search", unreadFilter: "Only with unread chapters", loading: "Loading data...",
                emptyList: "Your list is empty. Add your first title above or find one in the Catalog!",
                nothingFound: "Nothing found.", errorLoad: "Error loading data.",
                waitScan: "Waiting...", read: "Read:", saveBtn: "Save", deleteBtn: "Delete",
                alertName: "Title is required!", alertLink: "Provide at least one link!",
                adding: "Adding...", saving: "...", saved: "✓", confirmDelete: 'Delete "{name}" from the list?',
                deleting: "Deleting...", errorDelete: "Failed to delete title.",
                newChaptersTitle: "🔔 New Releases", noNotifications: "You're all caught up!",
                newChaptersText: "New chapters available: {from} - {to}",
                yourProfile: "Your Profile", userEmail: "Account:", 
                statTotalMangas: "Tracked Titles", statTotalRead: "Total Chapters Read", jumpToLibrary: "Go to Library",
                readOnDex: "Read on MangaDex", trackThis: "Track this"
            },
            ru: {
                title: "📚 Манхва Трекер", loginBtn: "Войти через Google", logoutBtn: "Выйти",
                loginMessage: "Пожалуйста, авторизуйтесь, чтобы видеть свой прогресс и добавлять тайтлы.",
                tabLibrary: "Библиотека", tabCatalog: "Каталог", tabNotifications: "Уведомления", tabProfile: "Профиль",
                addTitlePanel: "➕ Добавить свой тайтл", namePlaceholder: "Название манхвы (обязательно)",
                senkuroPlaceholder: "Ссылка на Senkuro (если есть)", rutokiPlaceholder: "Ссылка на Rutoki (если есть)",
                addBtn: "Добавить в кабинет", searchPlaceholder: "🔍 Поиск по названию...", catalogSearch: "🔍 Искать в глобальной базе MangaDex...",
                searchBtn: "Искать", unreadFilter: "Только с непрочитанными главами", loading: "Загрузка данных...",
                emptyList: "Ваш список пуст. Добавьте свой первый тайтл выше или найдите в Каталоге!",
                nothingFound: "Ничего не найдено.", errorLoad: "Ошибка загрузки.",
                waitScan: "Ожидание...", read: "Прочитано:", saveBtn: "Сохранить", deleteBtn: "Удалить",
                alertName: "Название обязательно!", alertLink: "Укажите хотя бы одну ссылку!",
                adding: "Добавление...", saving: "...", saved: "✓", confirmDelete: 'Удалить "{name}" из списка?',
                deleting: "Удаление...", errorDelete: "Не удалось удалить тайтл.",
                newChaptersTitle: "🔔 Новые релизы", noNotifications: "Все отслеживаемые главы прочитаны!",
                newChaptersText: "Доступны новые главы: {from} - {to}",
                yourProfile: "Ваш профиль", userEmail: "Учетная запись:", 
                statTotalMangas: "Отслеживается тайтлов", statTotalRead: "Прочитано глав всего", jumpToLibrary: "К библиотеке",
                readOnDex: "Читать на MangaDex", trackThis: "Отслеживать"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'uk';
        let t = translations[currentLang];
        let currentUser = null;
        let allCustomMangas = [];

        const langSwitcher = document.getElementById('lang-switcher');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const mainContent = document.getElementById('main-content');
        const loginMessage = document.getElementById('login-message');
        const container = document.getElementById('mangas-container');
        const saveCustomBtn = document.getElementById('save-custom-btn');
        const searchInput = document.getElementById('search-input');
        const unreadFilter = document.getElementById('unread-filter');
        const notifBadge = document.getElementById('notif-badge');

        langSwitcher.value = currentLang;
        updateLanguageUI();

        langSwitcher.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('appLang', currentLang);
            t = translations[currentLang];
            updateLanguageUI();
            if (currentUser) {
                renderFilteredList();
                renderNotifications();
                renderProfile();
                if(document.getElementById('catalog').classList.contains('active')) fetchCatalog();
            }
        });

        function updateLanguageUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
            document.documentElement.lang = currentLang;
        }

        // Обробка вкладок
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');

                if(tabId === 'catalog' && document.getElementById('catalog-container').innerHTML === '') {
                    fetchCatalog(); // Завантажуємо популярні тайтли при першому відкритті
                }
            });
        });

        loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
        logoutBtn.addEventListener('click', () => signOut(auth));

        searchInput.addEventListener('input', renderFilteredList);
        unreadFilter.addEventListener('change', renderFilteredList);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                loginMessage.style.display = 'none';
                mainContent.style.display = 'block';
                document.getElementById('profile-email').textContent = user.email;
                await loadPersonalData();
            } else {
                currentUser = null;
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                loginMessage.style.display = 'block';
                mainContent.style.display = 'none';
            }
        });

        async function loadPersonalData() {
            container.innerHTML = `<p>${t.loading}</p>`;
            try {
                const customMangasRef = collection(db, "users", currentUser.uid, "custom_mangas");
                const customSnap = await getDocs(customMangasRef);
                allCustomMangas = [];
                customSnap.forEach(doc => allCustomMangas.push({ id: doc.id, ...doc.data() }));

                renderFilteredList();
                renderNotifications();
                renderProfile();
            } catch (error) {
                container.innerHTML = `<p>${t.errorLoad}</p>`;
            }
        }

        // --- БІБЛІОТЕКА ---
        function renderFilteredList() {
            container.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            const onlyUnread = unreadFilter.checked;

            const filteredMangas = allCustomMangas.filter(manga => {
                const matchesSearch = manga.name.toLowerCase().includes(query);
                let matchesUnread = true;
                if (onlyUnread) {
                    const maxChap = Math.max(parseInt(manga.senkuroChapters) || 0, parseInt(manga.rutokiChapters) || parseInt(manga.dexChapters) || 0);
                    matchesUnread = maxChap > (manga.currentRead || 0);
                }
                return matchesSearch && matchesUnread;
            });

            if (filteredMangas.length === 0) {
                container.innerHTML = `<p style="color:#888;">${allCustomMangas.length === 0 ? t.emptyList : t.nothingFound}</p>`;
                return;
            }

            filteredMangas.forEach(manga => createCardHTML(manga));
        }

        function createCardHTML(manga) {
            const card = document.createElement('div');
            card.className = 'tracker-card';
            card.id = `card-${manga.id}`;
            
            let linksHTML = '';
            const addLink = (url, name, chapters) => {
                if(url) {
                    let ch = chapters && chapters !== '...' ? chapters : t.waitScan;
                    linksHTML += `<div class="platform"><a href="${url}" target="_blank">${name} 🔗</a><span style="color: #03dac6; font-weight:bold;">${ch}</span></div>`;
                }
            };
            addLink(manga.senkuroUrl, 'Senkuro', manga.senkuroChapters);
            addLink(manga.rutokiUrl, 'Rutoki', manga.rutokiChapters);
            addLink(manga.dexUrl, 'MangaDex', manga.dexChapters); // Підтримка MangaDex

            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                    <h3 style="margin:0; color:#fff;">${manga.name}</h3>
                    <button class="delete-btn" id="delete-${manga.id}" title="${t.deleteBtn}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
                ${linksHTML}
                <div class="user-progress">
                    <span>${t.read}</span>
                    <div>
                        <input type="number" id="input-${manga.id}" value="${manga.currentRead || 0}" min="0">
                        <button class="btn" style="padding: 5px 10px;" id="save-${manga.id}">${t.saveBtn}</button>
                    </div>
                </div>
            `;
            container.appendChild(card);

            document.getElementById(`save-${manga.id}`).addEventListener('click', async () => {
                const val = parseInt(document.getElementById(`input-${manga.id}`).value) || 0;
                const btn = document.getElementById(`save-${manga.id}`);
                btn.innerText = t.saving;
                
                await setDoc(doc(db, "users", currentUser.uid, "custom_mangas", manga.id), { currentRead: val }, { merge: true });
                
                const index = allCustomMangas.findIndex(m => m.id === manga.id);
                if (index !== -1) allCustomMangas[index].currentRead = val;
                
                btn.innerText = t.saved; 
                setTimeout(() => {
                    btn.innerText = t.saveBtn;
                    if (unreadFilter.checked) renderFilteredList();
                    renderNotifications(); 
                    renderProfile(); 
                }, 1000);
            });

            document.getElementById(`delete-${manga.id}`).addEventListener('click', async () => {
                if (confirm(t.confirmDelete.replace('{name}', manga.name))) {
                    try {
                        await deleteDoc(doc(db, "users", currentUser.uid, "custom_mangas", manga.id));
                        allCustomMangas = allCustomMangas.filter(m => m.id !== manga.id);
                        card.style.opacity = '0';
                        setTimeout(() => { renderFilteredList(); renderNotifications(); renderProfile(); }, 300);
                    } catch (error) { alert(t.errorDelete); }
                }
            });
        }

        saveCustomBtn.addEventListener('click', async () => {
            const name = document.getElementById('custom-name').value;
            const senkuro = document.getElementById('custom-senkuro').value;
            const rutoki = document.getElementById('custom-rutoki').value;

            if (!name) return alert(t.alertName);
            if (!senkuro && !rutoki) return alert(t.alertLink);

            saveCustomBtn.innerText = t.adding;
            saveCustomBtn.disabled = true;

            await addDoc(collection(db, "users", currentUser.uid, "custom_mangas"), {
                name, senkuroUrl: senkuro, rutokiUrl: rutoki, senkuroChapters: '...', rutokiChapters: '...', currentRead: 0, lastChecked: 0
            });

            document.getElementById('custom-name').value = ''; document.getElementById('custom-senkuro').value = ''; document.getElementById('custom-rutoki').value = '';
            saveCustomBtn.innerText = t.addBtn; saveCustomBtn.disabled = false;
            loadPersonalData(); 
        });

        // --- СПОВІЩЕННЯ ---
        function renderNotifications() {
            const notifContainer = document.getElementById('notifications-container');
            notifContainer.innerHTML = '';
            let newChaptersCount = 0;

            allCustomMangas.forEach(manga => {
                const maxChap = Math.max(parseInt(manga.senkuroChapters) || 0, parseInt(manga.rutokiChapters) || parseInt(manga.dexChapters) || 0);
                const read = manga.currentRead || 0;

                if (maxChap > read) {
                    newChaptersCount++;
                    const notifCard = document.createElement('div');
                    notifCard.className = 'notification-card';
                    const text = t.newChaptersText.replace('{from}', read + 1).replace('{to}', maxChap);
                    notifCard.innerHTML = `
                        <div>
                            <h4 style="margin: 0 0 5px 0; color: #fff;">${manga.name}</h4>
                            <p style="margin: 0; font-size: 0.9rem; color: #bbb;">${text}</p>
                        </div>
                        <button class="btn" style="padding: 5px 10px; font-size: 0.8rem;" onclick="document.querySelector('[data-tab=library]').click(); document.getElementById('search-input').value = '${manga.name}'; document.getElementById('search-input').dispatchEvent(new Event('input'));">${t.jumpToLibrary}</button>
                    `;
                    notifContainer.appendChild(notifCard);
                }
            });

            if (newChaptersCount > 0) {
                notifBadge.style.display = 'block'; notifBadge.innerText = newChaptersCount;
            } else {
                notifBadge.style.display = 'none'; notifContainer.innerHTML = `<p style="color: #888;">${t.noNotifications}</p>`;
            }
        }

        // --- ПРОФІЛЬ ---
        function renderProfile() {
            document.getElementById('stat-mangas').innerText = allCustomMangas.length;
            document.getElementById('stat-chapters').innerText = allCustomMangas.reduce((acc, curr) => acc + (curr.currentRead || 0), 0);
        }

        // --- КАТАЛОГ MANGADEX API ---
        document.getElementById('btn-search-catalog').addEventListener('click', () => {
            fetchCatalog(document.getElementById('catalog-search').value);
        });

        async function fetchCatalog(query = '') {
            const catContainer = document.getElementById('catalog-container');
            catContainer.innerHTML = `<p style="grid-column: 1/-1;">${t.loading}</p>`;
            
            try {
                // Базовий URL для пошуку манги. includes[]=cover_art необхідний для отримання обкладинки
                let url = 'https://api.mangadex.org/manga?includes[]=cover_art&limit=12&contentRating[]=safe&contentRating[]=suggestive';
                if (query) url += `&title=${encodeURIComponent(query)}`;

                const res = await fetch(url);
                const data = await res.json();

                catContainer.innerHTML = '';
                if(data.data.length === 0) {
                    catContainer.innerHTML = `<p style="grid-column: 1/-1;">${t.nothingFound}</p>`;
                    return;
                }

                data.data.forEach(manga => {
                    // Витягуємо назву (шукаємо англійську, російську або першу доступну)
                    const title = manga.attributes.title.en || manga.attributes.title.ru || Object.values(manga.attributes.title)[0] || 'Unknown';
                    
                    // Витягуємо обкладинку
                    const coverRel = manga.relationships.find(r => r.type === 'cover_art');
                    const coverFileName = coverRel ? coverRel.attributes.fileName : null;
                    const coverUrl = coverFileName ? `https://uploads.mangadex.org/covers/${manga.id}/${coverFileName}.256.jpg` : 'https://via.placeholder.com/256x360.png?text=No+Cover';
                    
                    // Посилання для читання
                    const dexUrl = `https://mangadex.org/title/${manga.id}`;
                    const latestChapter = manga.attributes.lastChapter || '...';

                    const card = document.createElement('div');
                    card.className = 'catalog-card';
                    card.innerHTML = `
                        <img src="${coverUrl}" alt="Cover" class="catalog-cover" loading="lazy">
                        <div class="catalog-info">
                            <div>
                                <h4 class="catalog-title" title="${title}">${title}</h4>
                            </div>
                            <div class="catalog-actions">
                                <a href="${dexUrl}" target="_blank" class="btn" style="text-align:center; text-decoration:none; background:#333; color:#fff; font-size:0.9rem;">📖 ${t.readOnDex}</a>
                                <button class="btn" style="font-size:0.9rem;" id="track-${manga.id}">➕ ${t.trackThis}</button>
                            </div>
                        </div>
                    `;
                    catContainer.appendChild(card);

                    // Додавання в базу даних з Каталогу
                    document.getElementById(`track-${manga.id}`).addEventListener('click', async (e) => {
                        e.target.innerText = t.adding;
                        e.target.disabled = true;
                        await addDoc(collection(db, "users", currentUser.uid, "custom_mangas"), {
                            name: title, dexUrl: dexUrl, dexChapters: latestChapter, currentRead: 0, lastChecked: Date.now()
                        });
                        e.target.innerText = t.saved;
                        loadPersonalData(); // Оновлюємо бібліотеку
                    });
                });
            } catch (error) {
                console.error(error);
                catContainer.innerHTML = `<p style="grid-column: 1/-1;">${t.errorLoad}</p>`;
            }
        }

    </script>
</body>
</html>
